name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      custom_version:
        description: 'Custom version (overrides version_type if set, format: X.Y.Z)'
        required: false
        type: string

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          CURRENT_VERSION=$(grep -oP "\\\$this->version\s*=\s*'\K[^']+" core/modules/modOvertime.class.php)
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: new
        run: |
          CURRENT="${{ steps.current.outputs.version }}"

          if [ -n "${{ github.event.inputs.custom_version }}" ]; then
            NEW_VERSION="${{ github.event.inputs.custom_version }}"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

            case "${{ github.event.inputs.version_type }}" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac

            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Check if version already up to date
        id: check
        run: |
          if [ "${{ steps.current.outputs.version }}" = "${{ steps.new.outputs.version }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version is already ${{ steps.new.outputs.version }}, skipping..."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version in module descriptor
        if: steps.check.outputs.skip != 'true'
        run: |
          sed -i "s/\$this->version = '[^']*'/\$this->version = '${{ steps.new.outputs.version }}'/" core/modules/modOvertime.class.php

      - name: Update ChangeLog
        if: steps.check.outputs.skip != 'true'
        run: |
          DATE=$(date +%Y-%m-%d)

          # Create new changelog entry
          NEW_ENTRY="## ${{ steps.new.outputs.version }} - $DATE\n\n- Version bump from ${{ steps.current.outputs.version }}\n"

          # Insert after the header
          sed -i "/^# CHANGELOG/a\\
          \\
          $NEW_ENTRY" ChangeLog.md

      - name: Create Pull Request
        if: steps.check.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to ${{ steps.new.outputs.version }}"
          title: "chore: bump version to ${{ steps.new.outputs.version }}"
          body: |
            ## Version Bump

            This PR bumps the module version from `${{ steps.current.outputs.version }}` to `${{ steps.new.outputs.version }}`.

            ### Changes
            - Updated version in `core/modules/modOvertime.class.php`
            - Updated `ChangeLog.md`

            ### Next Steps
            After merging this PR, create a new release with tag `v${{ steps.new.outputs.version }}` to trigger the build workflow.
          branch: version-bump-${{ steps.new.outputs.version }}
          delete-branch: true
          labels: |
            version-bump
            automated

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.skip }}" = "true" ]; then
            echo "::notice::Version is already ${{ steps.new.outputs.version }}, no changes made."
          else
            echo "::notice::Created PR to bump version from ${{ steps.current.outputs.version }} to ${{ steps.new.outputs.version }}"
          fi
